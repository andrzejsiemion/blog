{{- define "main" }}

<div class="post-single">
  <header class="post-header">
    <h1 class="post-title">{{ .Title }}</h1>
  </header>

  <div class="projects-list">
    {{- range .Params.projects }}
    <div class="project-card">
      <div class="project-header">
        <h2 class="project-title">
          <a href="{{ .url }}" target="_blank" rel="noopener noreferrer">{{ .name }}</a>
        </h2>
        {{- if .github }}
        <a class="project-icon-link" href="{{ .github }}" target="_blank" rel="noopener noreferrer" title="View source on GitHub">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0112 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/>
          </svg>
        </a>
        {{- end }}
        {{- if .appstore }}
        <a class="project-icon-link" href="{{ .appstore }}" target="_blank" rel="noopener noreferrer" title="Download on the App Store">
          <svg xmlns="http://www.w3.org/2000/svg" width="25" height="25" viewBox="0 0 24 24" fill="currentColor">
            <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
          </svg>
        </a>
        {{- end }}
      </div>
      <p class="project-description">{{ .description }}</p>
      {{- if .tags }}
      <ul class="project-tags">
        {{- range .tags }}
        <li>{{ . }}</li>
        {{- end }}
      </ul>
      {{- end }}
    </div>
    {{- end }}
  </div>
</div>

<style>
.projects-list {
  display: flex;
  flex-direction: column;
  gap: 1.5rem;
  margin-top: 2rem;
}

.project-card {
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 1.5rem;
  transition: box-shadow 0.2s ease;
}

.project-card:hover {
  box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
}

.project-header {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  margin-bottom: 0.5rem;
}

.project-title {
  font-size: 1.2rem;
  margin: 0;
  font-weight: 600;
}

.project-title a {
  color: var(--primary);
  text-decoration: none;
}

.project-title a:hover {
  text-decoration: underline;
}

.project-icon-link {
  color: var(--secondary);
  display: flex;
  align-items: center;
  transition: color 0.2s;
}

.project-icon-link:hover {
  color: var(--primary);
}

.project-description {
  margin: 0.5rem 0;
  color: var(--secondary);
  line-height: 1.6;
}

.project-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 0.4rem;
  list-style: none;
  padding: 0;
  margin: 0.75rem 0 0;
}

.project-tags li {
  font-size: 0.75rem;
  padding: 0.2rem 0.6rem;
  border-radius: 4px;
  background: var(--code-bg);
  color: var(--secondary);
}
</style>

{{- end }}
